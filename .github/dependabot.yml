version: 2
updates:
  # Gradle dependencies. Versions live in the root build.gradle.kts and the
  # gradle/libs.versions.toml catalog, so the root directory covers them; the
  # 17 module build files are BOM-managed (no direct versions to bump).
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      gradle-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major framework upgrades (Spring Boot 4.x, Testcontainers 2.x, springdoc
      # 3.x, Gradle 9.x) need a deliberate migration, not an auto-PR — and
      # auto-attempting them is what tripped Dependabot's change validator
      # (unknown_error). Minor/patch updates still flow through the group above.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Spring Boot minors can carry behavior changes — 3.5.x broke an aus-module
      # test — so pin to the current 3.3.x patch line (still gets patches) and
      # upgrade deliberately. Remove this to take the next Spring Boot minor.
      - dependency-name: "org.springframework.boot*"
        update-types: ["version-update:semver-minor"]
    commit-message:
      prefix: build

  # Keep the GitHub Actions used by the workflows pinned to current versions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      github-actions:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: ci
