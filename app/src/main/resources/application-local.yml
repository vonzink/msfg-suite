spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/msfg_los
    username: los
    password: los
# No oauth2 resource-server here: the 'local' profile uses LocalDevSecurityConfig (a fixed dev
# ADMIN principal), so the app boots and is testable without a reachable Cognito issuer.
# dev/prod set spring.security.oauth2.resourceserver.jwt.issuer-uri to the real Cognito pool.
los:
  cors:
    # Local dev: accept requests from Vite (5173, + 5180 dedicated staff-console preview port to
    # avoid colliding with the msfg-rag dashboard on 5173) and Next.js (3000/3001) dev servers.
    allowed-origins: "http://localhost:5173,http://localhost:5180,http://localhost:3000,http://localhost:3001"
  npi:
    # Local-dev key only (not real NPI). dev/prod must supply LOS_NPI_KEY from the environment.
    key: ${LOS_NPI_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
