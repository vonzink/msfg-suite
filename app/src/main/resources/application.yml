spring:
  application:
    name: msfg-los
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
los:
  storage:
    # Object-storage driver selection (ports-and-adapters). Default "db": LocalObjectStorageAdapter
    # keeps bytes in the document_content table and presigns to the internal, authenticated
    # /api/_local-blob/{token} endpoints (LocalBlobController). PROD sets driver=s3 →
    # S3ObjectStorageAdapter + real presigned PUT/GET URLs (LocalBlobController is then NOT registered).
    # Exactly one ObjectStoragePort + one BlobStoragePort bean is active per mode (@ConditionalOnProperty).
    driver: ${LOS_STORAGE_DRIVER:db}
    # s3:
    #   bucket: ${LOS_STORAGE_S3_BUCKET}        # required when driver=s3
    #   region: ${LOS_STORAGE_S3_REGION:us-east-1}
    #   presigned-ttl-seconds: 900              # advisory default the documents service uses for TTLs
  cors:
    # Exact origin allowlist — NEVER use wildcards. Empty = deny all cross-origin (safe default).
    # Override per profile or inject via LOS_CORS_ALLOWED_ORIGINS env var (comma-separated).
    allowed-origins: ${LOS_CORS_ALLOWED_ORIGINS:}
  npi:
    # No default — fail fast if LOS_NPI_KEY is unset (never silently encrypt NPI with a known key).
    # Base-64 of a 32-byte AES-256 key. local/test profiles supply a dev key; dev/prod require the env var.
    key: ${LOS_NPI_KEY}
  security:
    # When true (and NOT the local/test profile), RlsRuntimeRoleVerifier fails startup unless the live
    # datasource connects as a non-owner, non-superuser role that Postgres RLS actually constrains
    # (the seeded app_user — see V4__app_role.sql). Default false: nothing breaks until the non-owner
    # role is provisioned out-of-band (Phase-6 ops step). dev/prod flip this to true once app_user has a
    # LOGIN credential and the runtime datasource points at it. Override via LOS_ENFORCE_RLS_RUNTIME_ROLE.
    enforce-rls-runtime-role: ${LOS_ENFORCE_RLS_RUNTIME_ROLE:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info
springdoc:
  swagger-ui:
    path: /swagger-ui.html
