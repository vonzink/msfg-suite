spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER}
los:
  cors:
    # Set the real frontend origin(s) for production here, or via LOS_CORS_ALLOWED_ORIGINS env var.
    # Example: los.cors.allowed-origins: https://app.msfgco.com
    # allowed-origins: https://app.msfgco.com
